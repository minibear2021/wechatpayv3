name: Sync SDK from API Documentation

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'API documentation repository'
        required: true
      commit_sha:
        description: 'Commit SHA from API repo'
        required: true

jobs:
  sync-sdk-direct:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SDK repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytest

      - name: Fetch API changes and commit details
        id: fetch_changes
        run: |
          python scripts/fetch_api_changes.py \
            --repo "${{ github.event.inputs.source_repo }}" \
            --sha "${{ github.event.inputs.commit_sha }}"

      - name: Sync SDK with Haiku 4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: sync_sdk
        continue-on-error: true
        run: |
          python scripts/sync_sdk_haiku_direct.py

      - name: Generate tests with Haiku 4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: gen_tests
        continue-on-error: true
        run: |
          python scripts/generate_tests_haiku.py

      - name: Run SDK tests
        id: test_sdk
        continue-on-error: true
        run: |
          pytest tests/ -v --tb=short 2>&1 || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(sdk): Sync with API documentation changes from ${{ github.event.inputs.commit_sha }}"
          branch: "sync/api-${{ github.event.inputs.commit_sha }}"
          delete-branch: true
          title: "🔄 SDK Sync: Update from API documentation"
          body: |
            ## SDK Synchronization Report

            **Source API Repository:** `${{ github.event.inputs.source_repo }}`  
            **API Commit:** `${{ github.event.inputs.commit_sha }}`

            ### 📊 Changes Summary
            Haiku 4.5 analyzed the API changes and updated the SDK accordingly.

            <details>
            <summary>📝 View Changes Details</summary>

            See the files changed below for complete details.
            </details>

            ### 💻 SDK Updates
            - ✅ API client methods updated/added
            - ✅ Type hints synchronized  
            - ✅ Documentation updated
            - ✅ Tests generated for new endpoints

            ### 🧪 Test Results
            ${{ steps.test_sdk.outcome == 'success' && '✅ All tests passed' || '⚠️ See test results in logs' }}

            ---
            
            **Generated by:** Claude Haiku 4.5 (Free via GitHub Models API)  
            **Cost:** $0 • **No external API keys** ✨
            
            ⚠️ Please review changes carefully before merging.
          labels: "sdk-sync,auto-generated,haiku"
          assignees: minibear2021